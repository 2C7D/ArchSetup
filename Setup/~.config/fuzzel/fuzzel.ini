# fuzzel theme — foot standard
# palette available: 000000 FFFFFF FF0000 00FF00 0000FF FFFF00 00FFFF FF00FF
# roles actually used: 4 (surface, content, emphasis, chrome)
# active state solved by inversion, not a new color — same move as foot's cursor

[colors]
background=000000ff
text=ffffffff
input=ffffffff

match=ffff00ff
selection-match=ffff00ff

selection=ffffffff
selection-text=000000ff

border=00ffffff
prompt=00ffffff
placeholder=00ffffff
